appId: com.sinognss.ws
---

- launchApp:
    clearState: true

- tapOn: "点击连接设备"
- tapOn: "A253A825C8"

- extendedWaitUntil:
    visible:
      text: ".*延迟.*"
    timeout: 10000
- evalScript: ${output.counts.delay = output.counts.delay + 1}

- tapOn: "设备信息"
- tapOn: "版本信息"

- runFlow:
    label: "统计：版本信息"
    when:
      visible: "V9.4.9.24(94924)"
    commands:
      - evalScript: ${output.counts.version = output.counts.version + 1}

- tapOn:
    id: "iv_left_icon"

- tapOn: "注册信息"

- runFlow:
    label: "统计：RTK"
    when:
      visible: "RTK"
    commands:
      - evalScript: ${output.counts.rtk = output.counts.rtk + 1}

- tapOn:
    id: "iv_left_icon"

- tapOn:
    id: "iv_left_icon"

- tapOn: "开始作业"

- runFlow:
    label: "统计：准备就绪"
    when:
      visible: "准备就绪"
    commands:
      - evalScript: ${output.counts.ready = output.counts.ready + 1}

- tapOn:
    id: "iv_back"

- tapOn: "断开"
- tapOn: "连接"